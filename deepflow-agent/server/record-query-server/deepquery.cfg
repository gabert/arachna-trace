# ============================================================
# DeepFlow Record Query Server Configuration
# ============================================================
# Read-only HTTP API in front of ClickHouse, consumed by the UI.
# Pass at startup: java -jar record-query-server.jar config=deepquery.cfg

# server_port — HTTP listen port for the UI to call
#server_port=8082

# clickhouse_url — base URL of the ClickHouse HTTP interface
#clickhouse_url=http://localhost:8123
#clickhouse_database=deepflow
#clickhouse_user=deepflow
#clickhouse_password=deepflow

# cors_origin — allowed Origin for the UI dev server
# In production, set to the deployed UI origin (or "*" if behind a gateway).
#cors_origin=http://localhost:5173
