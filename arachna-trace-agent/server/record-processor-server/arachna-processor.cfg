# ============================================================
# ArachnaTrace Record Processor Server Configuration
# ============================================================
# This config is separate from agent (arachna-agent.cfg) and
# collector server (arachna-collector.cfg) configs.
# Pass it at startup: java -jar record-processor-server.jar config=arachna-processor.cfg

# ============================================================
# Kafka consumer settings
# ============================================================
kafka_bootstrap_servers=localhost:9092
kafka_topic=arachna-trace-records
kafka_group_id=arachna-trace-processor

# ============================================================
# Sink selection
# ============================================================
# clickhouse — insert call/payload rows into ClickHouse via HTTP
# logging    — print rendered+hashed lines to stdout (debugging)
sink_type=clickhouse

# ============================================================
# ClickHouse connection settings (used when sink_type=clickhouse)
# ============================================================
clickhouse_url=http://localhost:8123
clickhouse_database=arachna_trace
clickhouse_user=arachna_trace
clickhouse_password=arachna_trace
