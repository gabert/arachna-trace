matchers_include=com\.github\.gabert\.deepflow\.demo\.library\.repository\..*,com\.github\.gabert\.deepflow\.demo\.library\.service\..*,com\.github\.gabert\.deepflow\.demo\.library\.controller\..*
destination=http
http_server_url=http://collector:8099/records
session_resolver=spring-session
jpa_proxy_resolver=hibernate
# AX = args at exit. Required by the analysis/mutations endpoint to
# detect within-call argument mutation (own_hash(AR) vs own_hash(AX)).
# Default emit_tags omits AX.
emit_tags=SI,TN,RI,TS,CL,TI,AR,AX,RT,RE,TE
