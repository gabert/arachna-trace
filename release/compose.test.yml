# Test override for release/compose.yml — points every service at the
# locally-built v0.0.3 images instead of the v0.0.2 published in GHCR.
# Used to validate a release before pushing tags up.
#
# Usage:
#   ./release/release.sh v0.0.3 --no-push --yes      # build images locally
#   docker compose -p arachna-trace-smoke -f release/compose.yml -f release/compose.test.yml down -v
#   docker compose -p arachna-trace-test  -f release/compose.yml -f release/compose.test.yml up -d
#   open http://localhost:8080
#
# When the test passes:
#   - bump compose.yml's image tags to the new version
#   - rerun release.sh without --no-push to push to GHCR
#
# When the test fails: drop the file (no impact on the published stack)
# and iterate.

services:
  clickhouse:
    image: ghcr.io/gabert/arachna-trace-clickhouse:v0.0.4
  collector:
    image: ghcr.io/gabert/arachna-trace-collector:v0.0.4
  processor:
    image: ghcr.io/gabert/arachna-trace-processor:v0.0.4
  query:
    image: ghcr.io/gabert/arachna-trace-query:v0.0.4
  ui:
    image: ghcr.io/gabert/arachna-trace-ui:v0.0.4
  demo-spring-boot:
    image: ghcr.io/gabert/arachna-trace-demo-spring-boot:v0.0.4
