# ArachnaTrace quickstart compose
#
#   docker compose up
#   open http://localhost:8080
#
# Pulls pre-built images from GHCR; no source on the host needed.
# Bump the :latest tag (or pin :latest) to upgrade.

services:

  # --- Kafka (KRaft, single-node) ---
  kafka:
    image: apache/kafka:3.9.0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:19092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: arachna-trace-firstsetup-cluster

  # --- ClickHouse (schema baked in) ---
  clickhouse:
    image: ghcr.io/gabert/arachna-trace-clickhouse:latest
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  # --- Collector (receives binary records from agents → Kafka) ---
  collector:
    image: ghcr.io/gabert/arachna-trace-collector:latest
    depends_on:
      kafka:
        condition: service_healthy

  # --- Processor (Kafka → render+hash → ClickHouse) ---
  processor:
    image: ghcr.io/gabert/arachna-trace-processor:latest
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # --- Query API (read-only HTTP in front of ClickHouse, consumed by UI) ---
  query:
    image: ghcr.io/gabert/arachna-trace-query:latest
    depends_on:
      clickhouse:
        condition: service_healthy

  # --- UI (nginx serving Vue dist; proxies /api/ → query) ---
  ui:
    image: ghcr.io/gabert/arachna-trace-ui:latest
    ports:
      - "8080:80"
    depends_on:
      - query

  # --- Demo Spring Boot (agent baked in) ---
  demo-spring-boot:
    image: ghcr.io/gabert/arachna-trace-demo-spring-boot:latest
    depends_on:
      - collector
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  # --- Traffic generator (one-shot: hits the demo so the UI is non-empty) ---
  #
  # Each iteration drives the full forensic story:
  #   1. POST /api/library/demo-scenario — main scenario, succeeds, but
  #      silently mutates JPA entities (the look-innocent-mutation bug).
  #   2. GET  /api/authors/1/summary    — innocent-looking call, throws
  #      ArrayIndexOutOfBoundsException because Step 1 corrupted the
  #      ISBNs upstream. Caught by the @ControllerAdvice handler →
  #      HTTP 500 (the curl is intentionally non-fatal so the loop
  #      continues).
  #
  # Both calls share a cookie jar so they land in the same Spring HTTP
  # session — the UI's session view then shows two requests, one green
  # ("no exceptions") and one red ("3 exceptions in trace") — the cross-
  # request "request 2 broke because of request 1" story the new tooling
  # is built around.
  demo-traffic:
    image: curlimages/curl:8.10.1
    depends_on:
      demo-spring-boot:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        set -e
        COOKIE_JAR=/tmp/jar
        for i in 1 2 3; do
          echo ">>> demo run $$i — demo-scenario (succeeds, mutates state)"
          curl -sf -b "$$COOKIE_JAR" -c "$$COOKIE_JAR" \
              -X POST http://demo-spring-boot:8080/api/library/demo-scenario \
              -o /dev/null || true
          echo ">>> demo run $$i — author summary (throws, caught by handler)"
          curl -s -b "$$COOKIE_JAR" -c "$$COOKIE_JAR" \
              http://demo-spring-boot:8080/api/authors/1/summary \
              -o /dev/null -w "    HTTP %{http_code}\n" || true
          rm -f "$$COOKIE_JAR"
          sleep 1
        done
        echo ">>> demo traffic done"

volumes:
  clickhouse-data:
